document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n/* ─── RESET & TOKENS ─────────────────────────────── */\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n:root {\n  --purple:  #7b39fc;\n  --purple2: #6929e8;\n  --dark:    #2b2344;\n  --cream:   #FDFBF7;\n  --slate:   #0F172A;\n  --mid:     #334155;\n  --muted:   #64748B;\n  --light:   #94A3B8;\n  --border:  rgba(0,0,0,0.06);\n  --white:   #ffffff;\n  --f-sans:  'Inter', sans-serif;\n  --f-man:   'Manrope', sans-serif;\n  --f-cab:   'Cabin', sans-serif;\n  --f-serif: 'Instrument Serif', serif;\n  --f-mono:  'JetBrains Mono', monospace;\n}\n\nhtml { scroll-behavior: smooth; }\nbody { font-family: var(--f-sans); background: var(--cream); color: var(--slate); overflow-x: hidden; -webkit-font-smoothing: antialiased; }\n::selection { background: rgba(123,57,252,0.12); color: var(--purple); }\na { text-decoration: none; color: inherit; }\nbutton { cursor: pointer; font-family: inherit; }\nimg { display: block; }\ntextarea, input { font-family: inherit; }\n\n/* ─── PROGRESS BAR ───────────────────────────────── */\n#progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--purple); z-index: 300; width: 0; transition: width 0.1s linear; }\n\n/* ─── HERO ───────────────────────────────────────── */\n#hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: radial-gradient(ellipse 80% 60% at 50% 30%, #2b1f50 0%, #15102e 50%, #0a0718 100%); }\n#hero-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }\n#hero::before { content: ''; position: absolute; inset: 0; z-index: 0; background-image:\n  radial-gradient(circle at 25% 25%, rgba(123,57,252,0.35), transparent 45%),\n  radial-gradient(circle at 75% 65%, rgba(196,181,253,0.18), transparent 50%); pointer-events: none; }\n#hero::after { content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.12) 45%, rgba(0,0,0,0.65) 100%); }\n\n/* ─── NAVBAR (single, sticks + morphs to glass) ───── */\n#navbar {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 50;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 16px 48px;\n  background: transparent;\n  border-bottom: 1px solid transparent;\n  backdrop-filter: blur(0);\n  -webkit-backdrop-filter: blur(0);\n  transition: background 0.3s ease, padding 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;\n}\n#navbar.scrolled {\n  background: rgba(253,251,247,0.78);\n  border-bottom: 1px solid rgba(15,23,42,0.06);\n  backdrop-filter: blur(18px) saturate(140%);\n  -webkit-backdrop-filter: blur(18px) saturate(140%);\n  padding: 10px 48px;\n  box-shadow: 0 1px 0 rgba(15,23,42,0.02), 0 10px 40px -20px rgba(15,23,42,0.15);\n}\n.nav-logo { display: flex; align-items: center; gap: 10px; }\n.nav-logo img { height: 30px; width: auto; object-fit: contain; transition: filter 0.3s ease; }\n#logo-fallback { width: 30px; height: 30px; border-radius: 8px; background: var(--purple); display: none; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }\n.nav-logo-text { font-family: var(--f-man); font-weight: 700; font-size: 17px; color: white; letter-spacing: -0.02em; transition: color 0.3s ease; }\n.nav-logo-text span { color: #c4b5fd; transition: color 0.3s ease; }\n#navbar.scrolled .nav-logo-text { color: var(--slate); }\n#navbar.scrolled .nav-logo-text span { color: var(--purple); }\n.nav-links { display: flex; align-items: center; gap: 28px; }\n.nav-link { font-family: var(--f-man); font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.85); transition: color 0.2s, opacity 0.2s; }\n.nav-link:hover { color: white; }\n#navbar.scrolled .nav-link { color: var(--mid); }\n#navbar.scrolled .nav-link:hover { color: var(--purple); }\n.nav-actions { display: flex; align-items: center; gap: 10px; }\n.btn-signin { font-family: var(--f-man); font-weight: 600; font-size: 13.5px; color: white; background: transparent; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; padding: 8px 16px; transition: background 0.2s, color 0.2s, border-color 0.2s; }\n.btn-signin:hover { background: rgba(255,255,255,0.1); }\n#navbar.scrolled .btn-signin { color: var(--slate); border-color: rgba(15,23,42,0.12); background: transparent; }\n#navbar.scrolled .btn-signin:hover { background: rgba(15,23,42,0.04); border-color: rgba(15,23,42,0.2); }\n.btn-getstarted { font-family: var(--f-man); font-weight: 600; font-size: 13.5px; color: #fafafa; background: var(--purple); border: none; border-radius: 8px; padding: 8px 16px; box-shadow: 0 4px 14px rgba(123,57,252,0.35); transition: background 0.2s, transform 0.15s; display: inline-flex; align-items: center; gap: 6px; }\n.btn-getstarted:hover { background: var(--purple2); transform: translateY(-1px); }\n.btn-getstarted svg { width: 13px; height: 13px; }\n.nav-hamburger { display: none; background: none; border: none; color: white; padding: 4px; transition: color 0.3s ease; }\n#navbar.scrolled .nav-hamburger { color: var(--slate); }\n\n/* ─── HERO CONTENT ───────────────────────────────── */\n#hero-content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 24px 80px; }\n.tagline-pill { display: inline-flex; align-items: center; gap: 10px; background: rgba(85,80,110,0.42); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(164,132,215,0.5); border-radius: 10px; height: 38px; padding: 0 14px; margin-bottom: 28px; }\n.tagline-badge { background: var(--purple); border-radius: 6px; padding: 2px 9px; font-family: var(--f-cab); font-weight: 500; font-size: 12px; color: white; }\n.tagline-text { font-family: var(--f-cab); font-weight: 500; font-size: 14px; color: white; }\n.hero-headline { font-family: var(--f-serif); color: white; font-size: clamp(44px, 7vw, 92px); line-height: 1.07; max-width: 860px; margin-bottom: 22px; }\n.hero-headline em { font-style: italic; }\n.hero-sub { font-family: var(--f-sans); font-size: 18px; color: rgba(255,255,255,0.72); max-width: 560px; line-height: 1.7; margin-bottom: 40px; }\n.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }\n.cta-primary { display: inline-flex; align-items: center; gap: 8px; font-family: var(--f-cab); font-weight: 500; font-size: 16px; color: white; background: var(--purple); border: none; border-radius: 10px; padding: 14px 28px; box-shadow: 0 6px 20px rgba(123,57,252,0.4); transition: background 0.2s, transform 0.15s; }\n.cta-primary:hover { background: var(--purple2); transform: translateY(-1px); }\n.cta-secondary { display: inline-flex; align-items: center; gap: 8px; font-family: var(--f-cab); font-weight: 500; font-size: 16px; color: #f6f7f9; background: var(--dark); border: none; border-radius: 10px; padding: 14px 28px; transition: background 0.2s, transform 0.15s; }\n.cta-secondary:hover { background: #3a2f5a; transform: translateY(-1px); }\n\n/* ─── MOBILE MENU ────────────────────────────────── */\n#mobile-menu { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }\n#mobile-menu.open { opacity: 1; pointer-events: auto; }\n.mm-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: white; }\n.mobile-link { font-family: var(--f-man); font-weight: 600; font-size: 28px; color: white; transition: color 0.2s; }\n.mobile-link:hover { color: var(--purple); }\n.mobile-actions { display: flex; gap: 12px; }\n\n/* ─── SECTION SCAFFOLD ───────────────────────────── */\n.section { padding: 96px 0; }\n.section-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; }\n.section-white { background: white; border-top: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }\n.section-header { text-align: center; margin-bottom: 72px; }\n.eyebrow { display: inline-block; font-family: var(--f-man); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--purple); background: rgba(123,57,252,0.08); border-radius: 99px; padding: 5px 14px; margin-bottom: 18px; white-space: nowrap; }\n.section-title { font-family: var(--f-serif); font-size: clamp(32px,4vw,48px); color: var(--slate); line-height: 1.15; margin-bottom: 16px; }\n.section-sub { font-family: var(--f-sans); font-size: 17px; color: var(--muted); max-width: 520px; margin: 0 auto; line-height: 1.7; }\n\n/* ─── BUILT FOR (premium 3-col audience cards) ────── */\n.built-for { padding: 110px 0 110px; background: white; border-top: 1px solid rgba(15,23,42,0.05); border-bottom: 1px solid rgba(15,23,42,0.05); }\n.built-for-inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; }\n.bf-header { text-align: center; margin-bottom: 64px; max-width: 720px; margin-left: auto; margin-right: auto; }\n.bf-eyebrow { display: inline-block; font-family: var(--f-man); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--purple); background: rgba(123,57,252,0.08); border-radius: 99px; padding: 5px 14px; margin-bottom: 18px; }\n.bf-title { font-family: var(--f-serif); font-size: clamp(32px, 4vw, 48px); color: var(--slate); line-height: 1.15; margin-bottom: 16px; }\n.bf-title em { font-style: italic; color: var(--purple); }\n.bf-sub { font-family: var(--f-sans); font-size: 17px; color: var(--muted); max-width: 540px; margin: 0 auto; line-height: 1.7; }\n\n.bf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }\n laceholder { color: var(--light); }\n.email-submit { font-family: var(--f-cab); font-weight: 600; font-size: 14px; color: white; background: var(--purple); border: none; border-radius: 8px; padding: 12px 22px; white-space: nowrap; transition: background 0.2s; }\n.email-submit:hover { background: var(--purple2); }\n.cta-note { margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.35); }\n#waitlist-success { margin-top: 16px; font-family: var(--f-cab); font-size: 14px; color: #c4b5fd; opacity: 0; transition: opacity 0.4s; }\n\n/* ─── FOOTER ─────────────────────────────────────── */\nfooter { position: relative; padding: 96px 0 40px; border-top: 1px solid rgba(0,0,0,0.06); overflow: hidden; background: #0f0a1f; isolation: isolate; }\n.footer-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.55; }\n.footer-video-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15,10,31,0.65) 0%, rgba(15,10,31,0.92) 70%, rgba(15,10,31,1) 100%); z-index: 1; pointer-events: none; }\n.footer-inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 2; }\n.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px; margin-bottom: 56px; }\n.footer-logo { display: flex; align-items: center; gap: 10px; font-family: var(--f-man); font-weight: 700; font-size: 17px; color: white; margin-bottom: 14px; }\n.footer-logo .footer-logo-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--purple); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-shadow: 0 4px 14px rgba(123,57,252,0.4); }\n.footer-logo em { color: #c4b5fd; font-style: normal; }\n.footer-brand p { font-size: 13.5px; color: rgba(255,255,255,0.55); max-width: 280px; line-height: 1.75; }\n.footer-socials { display: flex; gap: 10px; margin-top: 24px; }\n.social-btn { width: 36px; height: 36px; border-radius: 50%;  font-size: 30px; color: var(--slate); margin-bottom: 28px; font-style: italic; }\n.modal-box section { margin-bottom: 20px; }\n.modal-box h4 { font-family: var(--f-man); font-weight: 700; font-size: 14px; color: var(--slate); margin-bottom: 8px; }\n.modal-box p { font-size: 14px; color: var(--muted); line-height: 1.7; }\n\n/* ─── REVEAL ─────────────────────────────────────── */\n.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease-out, transform 0.7s ease-out; }\n.reveal.visible { opacity: 1; transform: translateY(0); }\n.reveal.d1 { transition-delay: 0.12s; }\n.reveal.d2 { transition-delay: 0.24s; }\n\n/* ─── RESPONSIVE ─────────────────────────────────── */\n@media (max-width: 1100px) {\n  .bf-grid { grid-template-columns: repeat(2, 1fr); }\n  .demo-body { grid-template-columns: 1fr; }\n  .demo-input-col { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }\n  .features-grid { grid-template-columns: repeat(4, 1fr); }\n  .feature-card { grid-column: span 2; }\n  .feature-card.feat-hero { grid-column: span 4; }\n  .feature-card.feat-wide { grid-column: span 4; }\n}\n@media (max-width: 960px) {\n  #navbar { padding: 14px 18px; }\n  #navbar.scrolled { padding: 10px 18px; }\n  .nav-links, .nav-actions { display: none; }\n  .nav-hamburger { display: flex; }\n  .steps-grid { grid-template-columns: 1fr; gap: 1px; }\n  .output-grid { grid-template-columns: 1fr; }\n  .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }\n  .built-for { padding: 80px 0; }\n  .hero-headline { font-size: clamp(36px, 8vw, 56px); }\n  .hero-sub { font-size: 16px; }\n  .section { padding: 80px 0; }\n}\n@media (max-width: 640px) {\n  #navbar { padding: 12px 16px; }\n  #navbar.scrolled { padding: 9px 16px; }\n  .nav-logo-text { font-size: 16px; }\n  #hero-content { padding: 0 18px 60px; padding-top: 70px; }\n  .tagline-pill { height: 34px; padding: 0 12px; font-size: 12px; }\n  .tagline-text { font-size: 12.5px; }\n  .hero-ctas { flex-direction: column; align-items: stretch; width: 100%; max-width: 320px; }\n  .cta-primary, .cta-secondary { width: 100%; justify-content: center; padding: 13px 22px; font-size: 15px; }\n  .section { padding: 64px 0; }\n  .section-inner { padding: 0 20px; }\n  .built-for { padding: 64px 0; }\n  .built-for-inner { padding: 0 20px; }\n  .bf-header { margin-bottom: 40px; }\n  .bf-grid { grid-template-columns: 1fr; gap: 14px; }\n  .bf-card { padding: 26px 22px; }\n  .step { padding: 36px 26px; }\n  .features-grid { grid-template-columns: 1fr; gap: 14px; }\n  .feature-card, .feature-card.feat-hero, .feature-card.feat-wide { grid-column: span 1; padding: 26px 22px; }\n  .feature-card.feat-hero h3 { font-size: 20px; }\n  .demo-section { padding: 70px 0; }\n  .demo-section .section-inner { padding: 0 16px; }\n  .demo-frame { border-radius: 16px; }\n  .demo-input-col, .demo-output-col { padding: 18px; }\n  .demo-footer-strip { padding: 12px 18px; font-size: 10px; }\n  .demo-footer-strip .strip-group { gap: 10px; flex-wrap: wrap; }\n  .footer-grid { grid-template-columns: 1fr; gap: 32px; }\n  .footer-bottom { flex-direction: column; text-align: center; gap: 10px; }\n  .cta-block { padding: 56px 22px; }\n  .cta-block h2 { font-size: clamp(26px, 7vw, 36px); }\n  .cta-sub { font-size: 15px; }\n  .email-row { flex-direction: column; border-radius: 14px; padding: 14px; align-items: stretch; gap: 12px; }\n  .email-row svg { display: none; }\n  .email-field { padding: 6px 4px; }\n  .email-submit { padding: 14px; width: 100%; }\n  .section-title { font-size: clamp(26px, 6vw, 36px); }\n  .section-sub { font-size: 15px; }\n  .bf-title { font-size: clamp(26px, 6vw, 36px); }\n}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n\n\n<div id=\"progress-bar\"><\u002Fdiv>\n\n<!-- ════════════════════════════════\n     FIXED NAV (single, morphs on scroll)\n════════════════════════════════ -->\n<nav id=\"navbar\">\n  <div class=\"nav-logo\">\n    <div id=\"logo-fallback\" style=\"display:flex\">P<\u002Fdiv>\n    <span class=\"nav-logo-text\">Picao<span>AI<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"nav-links\">\n    <a href=\"#how-it-works\" class=\"nav-link\">How it Works<\u002Fa>\n    <a href=\"#demo\" class=\"nav-link\">Demo<\u002Fa>\n    <a href=\"#features\" class=\"nav-link\">Features<\u002Fa>\n    <a href=\"#waitlist\" class=\"nav-link\">Early Access<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"nav-actions\">\n    <button class=\"btn-signin\">Sign In<\u002Fbutton>\n    <a href=\"#waitlist\" class=\"btn-getstarted\">\n      Get Started\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 6 15 12 9 18\"><\u002Fpolyline><\u002Fsvg>\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <button class=\"nav-hamburger\" onclick=\"openMenu()\">\n    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\">\n      <line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\"><\u002Fline><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\"><\u002Fline>\n    <\u002Fsvg>\n  <\u002Fbutton>\n<\u002Fnav>\n\n<!-- ════════════════════════════════\n     HERO\n════════════════════════════════ -->\n<section id=\"hero\">\n  <video id=\"hero-video\" autoplay=\"\" loop=\"\" muted=\"\" playsinline=\"\" poster=\"\">\n    <!-- video stripped for standalone bundle -->\n  <\u002Fvideo>\n\n  <div id=\"hero-content\">\n    <div class=\"tagline-pill\">\n      <span class=\"tagline-badge\">New<\u002Fspan>\n      <span class=\"tagline-text\">Introducing Picao AI — Content Refraction Engine<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 class=\"hero-headline\">Speak once. <em>Publish<\u002Fem><br>everywhere, instantly.<\u002Fh1>\n\n    <p class=\"hero-sub\">Stop rewriting the same idea 12 times. Capture your intent once and Picao turns it into posts, scripts, visuals, and scheduled content — automa svg>\n        <\u002Fdiv>\n        <div class=\"bf-card-body\">\n          <div class=\"bf-role\">Educators &amp; Coaches<\u002Fdiv>\n          <div class=\"bf-use\">Transform lesson plans, research, and expert knowledge into posts and outreach that grow your audience and authority.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"bf-tag\">Thought leadership<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"bf-card reveal\">\n        <div class=\"bf-icon\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l19-9-9 19-2-8-8-2z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"bf-card-body\">\n          <div class=\"bf-role\">Marketers &amp; Agencies<\u002Fdiv>\n          <div class=\"bf-use\">Produce platform-native content for every client, in every voice, in a fraction of the time. Brief in, full campaign out.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"bf-tag\">Faster campaigns<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"bf-card reveal d1\">\n        <div class=\"bf-icon\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"bf-card-body\">\n          <div class=\"bf-role\">Teams &amp; Enterprises<\u002Fdiv>\n          <div class=\"bf-use\">Centralise your content strategy. Keep every person on brand, on message, and on schedule — without the back-and-forth.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"bf-tag\">Team alignment<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"bf-card reveal d2\">\n        <div class=\"bf-icon\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z\"><\u002Fpath><line x1=\"16\" y1=\"8\" x2=\"2\" y2=\"22\"><\u002Fline><line x1=\"17.5\" y1=\"15\" x2=\"9\" y2=\"15\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"bf-card-body\">\n          <div class=\"bf-role\">Solopreneurs<\u002Fdiv>\n          <div class=\"bf-use\">Show up consistently across every channel without burning out. Your brand runs on autopilot. You focus on the work.<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"bf-tag\">Always-on presence<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════════════════════\n     HOW IT WORKS\n════════════════════════════════ -->\n<section class=\"section\" id=\"how-it-works\">\n  <div class=\"section-inner\">\n    <div class=\"section-header reveal\">\n      <span class=\"eyebrow\">The Method<\u002Fspan>\n      <h2 class=\"section-title\">Three steps. Infinite reach.<\u002Fh2>\n      <p class=\"section-sub\">Most tools make you do the work. Picao is the execution layer — between your raw thought and your published brand.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"steps-grid reveal d1\">\n      <div class=\"step\">\n        <div class=\"step-num\">01 / CAPTURE<\u002Fdiv>\n        <div class=\"step-icon\">\n          <svg viewBox=\"0 0 24 24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"><\u002Fline><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Speak Your Intent<\u002Fh3>\n        <p>Talk naturally, type a rough idea, or paste a voice memo. Picao understands nuance and context — not just keywords.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"step-num\">02 / REFRACT<\u002 elopment Phase<\u002Fh4><p>Picao AI is currently in pre-launch. Waitlist signup does not guarantee immediate access.<\u002Fp><\u002Fsection>\n    <section><h4>2. Intellectual Property<\u002Fh4><p>All branding, \"Content Refraction\" concepts, and logic are property of Picao AI Inc.<\u002Fp><\u002Fsection>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ════════════════════════════════\n     SCRIPTS — zero external deps\n════════════════════════════════ -->\n<script>\n// Mobile menu\nfunction openMenu()  { document.getElementById('mobile-menu').classList.add('open');    document.body.style.overflow='hidden'; }\nfunction closeMenu() { document.getElementById('mobile-menu').classList.remove('open'); document.body.style.overflow=''; }\n\n// Modal\nfunction toggleModal(id) {\n  var m = document.getElementById(id);\n  m.classList.toggle('open');\n  document.body.style.overflow = m.classList.contains('open') ? 'hidden' : '';\n}\n\n// Scroll behaviours\nvar heroEl     = document.getElementById('hero');\nvar navbar     = document.getElementById('navbar');\nvar progressBar = document.getElementById('progress-bar');\n\nwindow.addEventListener('scroll', function() {\n  navbar.classList.toggle('scrolled', window.scrollY > 40);\n  var pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;\n  progressBar.style.width = pct + '%';\n}, { passive: true });\n\n// Reveal on scroll\nvar revealEls = document.querySelectorAll('.reveal');\nvar io = new IntersectionObserver(function(entries) {\n  entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.08 });\nrevealEls.forEach(function(el) { io.observe(el); });\n\n// Waitlist form\nasync function handleWaitlist(e) {\n  e.preventDefault();\n  var success = document.getElementById('waitlist-success');\n  try {\n    var res = await fetch('https://formspree.io/f/xvzbaowa', {\n      method: 'POST', body: new FormData(e.target), headers: { 'Accept': 'application/json' }\n    });\n    if (res.ok) {\n      success.style.opacity = '1';\n      e.target.reset();\n      setTimeout(function(){ success.style.opacity='0'; }, 6000);\n    }\n  } catch(err) { console.error(err); }\n}\n\n// ── Refraction Demo ────────────────────────────────\nvar presets = [\n  \"Founders should ship ugly first and iterate fast. The perfect product that never launches is worth nothing. Done beats perfect — every time.\",\n  \"Q3 results: we hit 200% of our growth target. Here's what we did differently this quarter and what it means for where we're headed.\",\n  \"AI is fundamentally changing how we learn. Teachers aren't becoming obsolete — but the ones who ignore this shift will be.\"\n];\n\nvar outputData = [\n  {\n    linkedin: \"Most founders get this backwards.\\n\\nThey spend 18 months building the perfect product. No users. No feedback. No market.\\n\\nThe best founders I know shipped something embarrassing in 6 weeks — and built something incredible by week 26.\\n\\nDone beats perfect. Every single time.\",\n    twitter:  \"Thread: Why shipping ugly is your biggest competitive advantage 🧵\\n\\n1/ The best product that never launches is worth $0.\\n2/ Shipping creates feedback. Feedback creates PMF. PMF creates revenue.\\n3/ Your users don't care about your architecture. They care if it works.\",\n    youtube:  \"[HOOK] I almost killed my startup trying to make it perfect. Here's what I did instead — and how it 10x'd our growth in 90 days.\",\n    email:    \"Subject: Why I shipped the ugliest version first\\n\\nPerfection is a trap.\\n\\nWe spent weeks on font sizes while our competitors got users. Then we stopped. And shipped.\"\n  },\n  {\n    linkedin: \"Q3 numbers are in — and I didn't think we'd be here.\\n\\n200% of target. What changed:\\n\\n→ Stopped trying to please everyone\\n→ Doubled down on the 20% doing 80% of the work\\n→ Let data lead, not assumptions\\n\\nQ4 will be different.\",\n    twitter:  \"Q3 results: 200% of target. 🎯\\n\\nWhat we did differently (thread):\\n1/ Cut 4 channels. Focused on 2.\\n2/ Rebuilt our ICP from scratch in July.\\n3/ Daily standups for 6 weeks straight.\\n\\nSometimes less is more.\",\n    youtube:  \"[HOOK] We 2x'd our Q3 target — not by doing more, but by doing *less*. Here's exactly what we cut.\",\n    email:    \"Subject: The counterintuitive thing we did to hit 200%\\n\\nA teardown of what worked, what didn't, and what we're betting Q4 on.\"\n  },\n  {\n    linkedin: \"A bold claim: the traditional classroom has about 5 years left before it's unrecognisable.\\n\\nAI tutors. Adaptive curricula. Real-time feedback.\\n\\nTeachers aren't going anywhere — but those who master these tools will be untouchable.\",\n    twitter:  \"Hot take: AI isn't going to replace teachers.\\n\\nIt's going to replace teachers who don't use AI.\\n\\nHere's why the shift is happening faster than education wants to admit 🧵\",\n    youtube:  \"[HOOK] I tested 5 AI tools in a real classroom for 30 days. The results changed everything I thought about the future of learning.\",\n    email:    \"Subject: What 30 days of AI in the classroom taught me\\n\\nThe students adapted faster than I expected. So did their outcomes.\"\n  }\n];\n\nfunction setPreset(i) {\n  document.getElementById('raw-idea').value = presets[i];\n  scheduleRefract();\n}\n\nfunction setStatus(text, state) {\n  var el = document.getElementById('refract-status');\n  el.innerHTML = '<span class=\"pulse-dot\"><\u002Fspan>' + text;\n  el.classList.remove('working', 'done');\n  if (state) el.classList.add(state);\n}\n\nvar refractTimer;\nfunction scheduleRefract() {\n  setStatus('Analyzing intent…', 'working');\n  clearTimeout(refractTimer);\n  refractTimer = setTimeout(runRefract, 950);\n}\n\nfunction generateGeneric(val) {\n  var short = val.length > 70 ? val.slice(0,70)+'...' : val;\n  return {\n    linkedin: \"Here's a perspective that changed how I think:\\n\\n\"+val+\"\\n\\nMost people scroll past this. The ones who don't? They build differently.\",\n    twitter:  'Thread on something I\\'ve been sitting with 🧵\\n\\n\"'+short+'\"\\n\\n1/ This matters more than people realise.\\n2/ Here\\'s the nuance most people miss.\\n3/ Here\\'s what I\\'m doing about it.',\n    youtube:  \"[HOOK] Everyone's talking about this — but nobody's talking about the part that actually matters.\",\n    email:    \"Subject: The thing nobody wants to say\\n\\n\\\"\"+short+\"\\\"\\n\\nI think this changes everything about how we approach this space.\"\n  };\n}\n\nfunction runRefract() {\n  var val = document.getElementById('raw-idea').value.trim();\n  if (!val) { setStatus('Awaiting input'); return; }\n  var match = -1;\n  presets.forEach(function(p,i){ if(val===p) match=i; });\n  var data = match >= 0 ? outputData[match] : generateGeneric(val);\n  setStatus('Refracting across 4 channels…', 'working');\n  ['linkedin','twitter','youtube','email'].forEach(function(id, i) {\n    var card = document.getElementById('out-'+id);\n    var text = document.getElementById('out-'+id+'-text');\n    card.classList.remove('lit');\n    setTimeout(function(){\n      text.textContent = data[id];\n      card.classList.add('lit');\n      if (i===3) setStatus('Refracted into 4 formats', 'done');\n    }, 220 + i*200);\n  });\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
